name: Deploy EPC Dashboard to GitHub Pages

# Triggers: any push to main that touches the dashboard,
# or a manual run from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'reports/dashboard.html'
      - 'reports/national_savings_summary.json'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

# GitHub Pages deployment requires these token permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are not cancelled
# so a mid-deploy push doesn't leave the site in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Wrap the reports/ directory in a thin index so GitHub Pages serves
      # dashboard.html as the root page.
      - name: Create Pages index
        run: |
          cp reports/dashboard.html reports/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
